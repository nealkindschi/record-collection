name = "record-collection"
pages_build_output_dir = "./dist"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "record-collection-db"
database_id = "REPLACE_AFTER_RUNNING_wrangler_d1_create"

[[kv_namespaces]]
binding = "SYNC_KV"
id = "REPLACE_AFTER_RUNNING_wrangler_kv_namespace_create"

[vars]
DISCOGS_USERNAME = "REPLACE_WITH_YOUR_DISCOGS_USERNAME"
